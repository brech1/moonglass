name: Setup Rust
description: Install the pinned Rust toolchain and restore Cargo dependency caches.

inputs:
  toolchain:
    description: Rust toolchain to install. Defaults to rust-toolchain.toml.
    required: false
    default: ""
  components:
    description: Space-separated rustup components to install.
    required: false
    default: ""
  cache-prefix:
    description: Prefix for this job's Cargo cache key.
    required: false
    default: cargo

runs:
  using: composite
  steps:
    - name: Install Rust
      shell: bash
      run: |
        set -euo pipefail

        toolchain="${{ inputs.toolchain }}"
        if [ -z "$toolchain" ]; then
          toolchain="$(awk -F '"' '/^channel/ { print $2; exit }' rust-toolchain.toml)"
        fi
        if [ -z "$toolchain" ]; then
          echo "toolchain input is empty and rust-toolchain.toml has no channel" >&2
          exit 1
        fi

        args=("$toolchain" --profile minimal)
        components="${{ inputs.components }}"
        for component in $components; do
          args+=(--component "$component")
        done

        rustup toolchain install "${args[@]}"
        rustup default "$toolchain"

    - name: Compute rustc cache key
      id: rust
      shell: bash
      run: echo "version=$(rustc --version | tr ' /' '__')" >> "$GITHUB_OUTPUT"

    - name: Cache cargo registry and git checkouts
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-${{ inputs.cache-prefix }}-${{ steps.rust.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.cache-prefix }}-${{ steps.rust.outputs.version }}-
          ${{ runner.os }}-${{ inputs.cache-prefix }}-
