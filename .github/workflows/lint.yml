name: lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  ACTIONLINT_VERSION: "1.7.12"
  ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: "10"

defaults:
  run:
    shell: bash

jobs:
  format:
    name: format
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache-prefix: lint-format

      - name: format
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          cache-prefix: lint-clippy

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  actionlint:
    name: actionlint-shellcheck
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: install-shellcheck
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends shellcheck
          fi

      - name: install-actionlint
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive" | sha256sum -c -
          tar -xzf "$archive" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: actionlint-shellcheck
        env:
          SHELLCHECK_OPTS: -S error
        run: actionlint -color

  lint_required:
    name: lint-required
    needs:
      - format
      - clippy
      - actionlint
    if: always()
    runs-on: ubuntu-24.04
    permissions: {}

    steps:
      - name: check-required-jobs
        env:
          FORMAT_RESULT: ${{ needs.format.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
        run: |
          printf 'format=%s\n' "$FORMAT_RESULT"
          printf 'clippy=%s\n' "$CLIPPY_RESULT"
          printf 'actionlint=%s\n' "$ACTIONLINT_RESULT"

          test "$FORMAT_RESULT" = "success"
          test "$CLIPPY_RESULT" = "success"
          test "$ACTIONLINT_RESULT" = "success"
