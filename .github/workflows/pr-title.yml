name: PR title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Validate PR title against Conventional Commits
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            chore
            ci
            build
            style
            revert
          requireScope: false
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: |
            PR title subject must start with a lowercase letter and not end
            with a period. Example: `feat(fork_choice): add proposer boost`.
