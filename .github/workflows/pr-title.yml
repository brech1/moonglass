name: PR title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title against Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types. Squash-merged PR titles become the commit subject,
          # so the title must start with one of these.
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            chore
            ci
            build
            style
            revert
          # Optional scope. When present must be lowercase letters, digits,
          # underscores, dashes, or slashes.
          requireScope: false
          # Subject (text after the colon) starts lowercase, no trailing period.
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: |
            PR title subject must start with a lowercase letter and not end
            with a period. Example: `feat(fork_choice): add proposer boost`.
